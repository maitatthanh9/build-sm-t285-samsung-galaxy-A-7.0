name: Build Kernel SM-T285

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mã nguồn Kernel
        uses: actions/checkout@v4
        with:
          repository: 'maitatthanh9/android_kernel_samsung_gtexswifi' # Thay bằng link repo kernel của bạn
          ref: 'lineage-18.1' # Nhánh bạn đang dùng

      - name: Cài đặt công cụ build
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential curl flex gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi git libncurses-dev python3 unzip zlib1g-dev

      - name: Build Kernel
        run: |
          export ARCH=arm
          export CROSS_COMPILE=arm-linux-gnueabi-
          make gtexswifi_defconfig # Thay bằng file config đúng cho SM-T285
          make -j$(nproc)
