name: Build Kernel SM-T285

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Kiểm tra cấu trúc thư mục
        run: |
          echo "Danh sách thư mục hiện tại:"
          ls -R

      - name: Cài đặt công cụ
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential curl flex gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi git libncurses-dev python3 unzip zlib1g-dev

      - name: Build
        run: |
          export ARCH=arm
          export CROSS_COMPILE=arm-linux-gnueabi-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          # Sau khi thấy cấu trúc trong log, sửa tên file nếu cần
          make gtexswifi_defconfig
          make -j$(nproc)
