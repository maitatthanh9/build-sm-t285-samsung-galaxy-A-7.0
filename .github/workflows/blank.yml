name: Build Kernel SM-T285

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List files
        run: find . -maxdepth 4 -name "*_defconfig"

      - name: Build
        run: |
          export ARCH=arm
          export CROSS_COMPILE=arm-linux-gnueabi-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          make gtexswifi_defconfig
          make -j$(nproc)
